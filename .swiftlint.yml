# SwiftLint configuration (= dev-bootstrap baseline、AGENTS.md §12.3)
# `swiftlint lint --strict` (= local-ci.sh) で warning も error 扱い。

excluded:
  - Pods
  - Carthage
  - .build
  - DerivedData
  - build
  - Generated
  - "**/*.generated.swift"

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - operator_usage_whitespace
  - redundant_nil_coalescing
  - sorted_imports
  - trailing_closure
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

disabled_rules:
  - todo
  - trailing_whitespace

# swiftformat の --trailingcommas always と整合させる
trailing_comma:
  mandatory_comma: true

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 80
  error: 120

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - z
    - to
    - in
    - on

reporter: "xcode"
